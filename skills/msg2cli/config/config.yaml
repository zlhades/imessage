# msg2cli 配置文件

# 输入源配置
inputs:
  imessage:
    enabled: true
    contacts:
      - "zlhades@icloud.com"
      - "zlhades@hotmail.com"
    check_interval: 3  # 轮询间隔（秒）
    db_path: "~/Library/Messages/chat.db"  # macOS iMessage 数据库路径

  # slack:
  #   enabled: false
  #   token: "xoxb-your-bot-token"
  #   channels:
  #     - "commands"
  #   check_interval: 5

# 输出目标（AI CLI）
outputs:
  qwen:
    enabled: true
    type: "tmux"           # tmux | direct
    session: "ai_cli"      # tmux 会话名
    command: "qwen"        # CLI 命令
    prompt_suffix: |       # 注入消息后追加的 Prompt
      【执行后请回复】
      请在执行完成后说明执行结果。

  # codex:
  #   enabled: false
  #   type: "tmux"
  #   session: "codex_cli"
  #   command: "codex"

  # cloudcode:
  #   enabled: false
  #   type: "tmux"
  #   session: "cloudcode_cli"
  #   command: "cloudcode"

# 路由规则（输入 → 输出）
routing:
  default_output: "qwen"   # 默认输出目标
  # rules:
  #   - input: "slack"
  #     output: "codex"
  #   - input: "imessage"
  #     output: "qwen"

# 回复配置
reply:
  imessage:
    enabled: true
    reply_to: "zlhades@icloud.com"  # 统一回复到这个联系人
    auto_reply_patterns:            # 简单自动回复模式
      - pattern: "测试"
        response: "✅ 监听器正常工作"
      - pattern: "回复 yes"
        response: "yes"

# 全局设置
settings:
  log_file: "/tmp/msg2cli.log"
  done_file: "/tmp/msg2cli_done.txt"
  auto_markers:                    # 防死循环标记
    - "✅"
    - "📊"
    - "❌"
    - "🚀"
    - "👋"
    - "[自动]"
    - "执行完成"
    - "收到："
