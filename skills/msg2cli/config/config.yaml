# msg2cli configuration file

# Input sources
inputs:
  imessage:
    enabled: true
    contacts:
      - "zlhades@icloud.com"
      - "zlhades@hotmail.com"
    check_interval: 3
    db_path: "~/Library/Messages/chat.db"

# Output targets
outputs:
  qwen:
    enabled: true
    type: "tmux"
    session: "ai_cli"
    command: "qwen"
    min_wait: 5
    capture_lines: 500
    finished_markers:
      - "for shortcuts"
      - "Would you like"
      - "Type your message"
      - "Command completed"
      - "Error:"
      - "Exception:"
      - "Command not found"
    error_markers:
      - "Error:"
      - "Exception:"
      - "Traceback (most recent call last)"
      - "Command not found"

# Routing (fixed: imessage -> qwen)
routing:
  default_output: "qwen"

# Reply configuration
reply:
  imessage:
    enabled: true
    reply_to: "zlhades@icloud.com"
    max_length: 1000
    auto_reply_patterns:
      - pattern: "test"
        response: "[Auto] Watcher is working"
      - pattern: "reply yes"
        response: "yes"

# Global settings
settings:
  log_file: "/tmp/msg2cli.log"
  done_file: "/tmp/msg2cli_done.txt"
  # Anti-loop: any message containing these markers is ignored
  # Must cover ALL reply prefixes to prevent infinite loops
  # Covers both emoji and bracket-style markers
  auto_markers:
    - "✅"
    - "❌"
    - "⏱️"
    - "📊"
    - "✅ Done"
    - "❌ Failed"
    - "[Received]"
